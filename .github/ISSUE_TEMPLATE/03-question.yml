name: ❓ 使用咨询 / 建议 Question & Suggestion
description: 使用疑问、配置咨询、对固件的建议（非故障、非插件集成请求）
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        常见问题先自查：
        - **固件基底**：ImmortalWrt（NSS 分支）SNAPSHOT，无 24.10 等 release 版本计划，有定制需求可 fork 本仓库自编（Release 附件含完整 .config）。
        - **opkg 装不上 kmod-xxx**：自编固件内核与官方软件仓库不匹配，kmod 无法后装，需要请提「插件集成请求」。
        - **要用 Docker**：请刷 PLUS 版，已内置全部依赖。
  - type: dropdown
    id: profile
    attributes:
      label: 固件版本 / Profile
      options:
        - PURE 纯净版
        - PLUS 版
        - 还没刷，准备刷
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: 固件日期 / Build date（已刷机时填写）
      description: 固件文件名或 Release tag 中的时间，如 26.07.03-22.45.24
      placeholder: 26.07.03-22.45.24
  - type: textarea
    id: question
    attributes:
      label: 咨询内容 / Question
      description: 想了解什么、遇到什么疑惑，或希望固件怎么改进；说明使用场景更容易得到有效答复
    validations:
      required: true
