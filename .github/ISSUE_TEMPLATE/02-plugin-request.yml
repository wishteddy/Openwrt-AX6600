name: 🧩 插件集成请求 / Plugin Request
description: 希望固件集成某个插件或内核模块（默认只集成进 PLUS 版，PURE 保持轻量）
labels: [enhancement]
body:
  - type: input
    id: name
    attributes:
      label: 插件 / 包名 Package name
      description: 如 luci-app-xxx、kmod-xxx
      placeholder: kmod-usb-printer
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: 用途说明 / Use case
      description: 为什么需要随固件集成（例如 kmod 与内核绑定、无法事后安装）
    validations:
      required: true
  - type: input
    id: upstream
    attributes:
      label: 上游仓库 / Upstream repo（第三方插件时填写）
      placeholder: https://github.com/xxx/luci-app-xxx
